{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fas fa-calendar-check"></i>
            </div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to your account</p>
        </div>
        
        <form method="POST" action="{{ url_for('login') }}" data-validate>
            <div class="user-type-toggle">
                <input type="radio" name="user_type" value="teacher" id="teacher-type" checked>
                <label for="teacher-type">
                    <i class="fas fa-chalkboard-teacher"></i>
                    Teacher
                </label>
                <input type="radio" name="user_type" value="student" id="student-type">
                <label for="student-type">
                    <i class="fas fa-user-graduate"></i>
                    Student
                </label>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" class="form-control" id="username" name="username" 
                       placeholder="Enter your username" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" 
                       placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
                <i class="fas fa-sign-in-alt"></i>
                Sign In
            </button>
        </form>
        
        <div class="auth-footer">
            <p>New here? <a href="{{ url_for('register') }}">Create a teacher account</a></p>
        </div>
    </div>
</div>

<style>
    .auth-wrapper {
        min-height: 100vh;
        padding-top: 0;
    }
    .main-content.no-nav {
        padding-top: 0;
    }
</style>
{% endblock %}
